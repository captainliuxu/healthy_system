<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>记录</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/record.css" />
</head>
<body>
<div class="container">
    <div class="header">健康记录</div>

    <div class="content">
        <div class="page-tip">
            今天也要记得关注自己的身体状态
        </div>

        <div class="card">
            <div class="card-title">今日服药情况</div>
            <div class="card-desc">请记录今天是否已按时服药</div>
            <div class="btn-group">
                <button type="button">已服用</button>
                <button type="button">未服用</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">血压记录</div>
            <div class="card-desc">输入本次测量结果，方便后续趋势分析</div>
            <div class="input-group">
                <input type="text" placeholder="请输入收缩压（高压）" />
                <input type="text" placeholder="请输入舒张压（低压）" />
            </div>
        </div>

        <div class="card">
            <div class="card-title">今日身体状态</div>
            <div class="card-desc">请选择今天最接近的身体感受</div>
            <div class="btn-group">
                <button type="button">正常</button>
                <button type="button">头晕</button>
                <button type="button">乏力</button>
            </div>
        </div>
    </div>

    <div class="navbar">
        <a href="index.html">首页</a>
        <a href="chat.html">聊天</a>
        <a href="record.html" class="active">记录</a>
        <a href="profile.html">我的</a>
    </div>
</div>
</body>
</html>
