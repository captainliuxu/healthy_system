<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chat-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 58vh;
            overflow-y: auto;
            padding-bottom: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 10px 12px;
            border-radius: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg.user {
            align-self: flex-end;
            background: #4CAF50;
            color: white;
        }

        .msg.ai {
            align-self: flex-start;
            background: #f1f3f5;
            color: #222;
        }

        .input-bar {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .input-bar input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        .input-bar button,
        .action-btn {
            border: none;
            background: #4CAF50;
            color: white;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
        }

        .action-btn {
            margin-bottom: 12px;
            width: 100%;
        }

        .tip {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">聊天</div>

    <div class="content">
        <button class="action-btn" onclick="triggerProactiveMessage()">模拟主动提醒</button>
        <div class="tip">演示用：点击按钮可模拟 AI 主动发言</div>

        <div id="chatArea" class="chat-area">
            <div class="msg ai">你好，我是你的健康助手。今天感觉怎么样？</div>
            <div class="msg ai">如果你有头晕、乏力、忘记服药等情况，可以直接告诉我。</div>
        </div>

        <div class="input-bar">
            <input id="chatInput" type="text" placeholder="请输入内容">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <div class="navbar">
        <a href="index.html">首页</a>
        <a href="chat.html" class="active">聊天</a>
        <a href="record.html">记录</a>
        <a href="profile.html">我的</a>
    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
